<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }

        video {
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.1);
        }

        .message {
            text-align: center;
            color: #fff;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <video id="mainVideo" src="https://files.catbox.moe/tz0ez6.mp4" controls autoplay loop muted
            playsinline></video>
        <p class="message">Click video to unmute and play</p>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const MONETAG_LINK = 'https://otieu.com/4/10384328';
        let hasClicked = false;

        video.addEventListener('click', function () {
            if (!hasClicked) {
                // Open Monetag link in new tab
                window.open(MONETAG_LINK, '_blank');
                hasClicked = true;
            }

            // Unmute and play
            video.muted = false;
            video.play();
        });
    </script>
</body>

</html>

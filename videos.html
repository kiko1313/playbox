<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos - PlayBox</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #D72638, #7B2CBF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #999;
            font-size: 1rem;
        }

        .exit-link {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.3s;
            z-index: 100;
        }

        .exit-link:hover {
            background: rgba(215, 38, 56, 0.8);
        }

        /* Video List */
        .video-list {
            max-width: 900px;
            margin: 0 auto;
        }

        .video-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            transition: transform 0.3s, border-color 0.3s;
        }

        .video-item:hover {
            transform: translateY(-3px);
            border-color: rgba(215, 38, 56, 0.5);
        }

        .video-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #fff;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-player iframe,
        .video-player video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .no-videos {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .no-videos i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <a href="index.html" class="exit-link">← Back to Home</a>

    <div class="header">
        <h1>Video Gallery</h1>
        <p>Watch premium videos</p>
    </div>

    <div class="video-list" id="videoList">
        <!-- Videos will be injected here -->
    </div>

    <script>
        const MONETAG_LINK = 'https://otieu.com/4/10384328';

        // Load videos from localStorage (saved via admin panel)
        const stored = localStorage.getItem('playboxData');
        const data = stored ? JSON.parse(stored) : { videos: [] };
        const videos = data.videos || [];

        // Track if user has clicked (only trigger Monetag once per session)
        let hasTriggeredAd = sessionStorage.getItem('monetag_triggered') === 'true';

        // Render video list
        function renderVideos() {
            const container = document.getElementById('videoList');

            if (videos.length === 0) {
                container.innerHTML = `
                    <div class="no-videos">
                        <i class="fas fa-video"></i>
                        <h3>No videos yet</h3>
                        <p>Add videos from the admin panel</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = videos.map((video, index) => {
                const playerHtml = getPlayerHtml(video);
                return `
                    <div class="video-item" data-index="${index}">
                        <h2 class="video-title">${video.title}</h2>
                        <div class="video-player" onclick="handleVideoClick(event)">
                            ${playerHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Generate player HTML based on video type
        function getPlayerHtml(video) {
            const src = video.src || video.url;

            if (!src) {
                return `<p style="padding: 40px; text-align: center; color: #999;">No video URL found</p>`;
            }

            console.log('Processing video URL:', src);

            // Doodstream - check for various formats
            if (src.toLowerCase().includes('dood')) {
                console.log('Detected as Doodstream');
                return `<iframe src="${src}" frameborder="0" allowfullscreen allow="autoplay" style="width:100%;height:100%;"></iframe>`;
            }

            // YouTube
            if (src.includes('youtube.com') || src.includes('youtu.be')) {
                console.log('Detected as YouTube');
                const videoId = getYouTubeID(src);
                if (videoId) {
                    return `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" style="width:100%;height:100%;"></iframe>`;
                }
            }

            // Direct video file (check extension OR assume it's a video link)
            const lowerSrc = src.toLowerCase();
            if (lowerSrc.match(/\.(mp4|webm|ogg|mov|avi)$/i) || src.includes('catbox.moe') || src.includes('video')) {
                console.log('Detected as direct video');
                return `<video src="${src}" controls style="width:100%;height:100%;"></video>`;
            }

            // If nothing matched, try as iframe (for other embed services)
            console.log('Unknown format, trying as iframe');
            return `<iframe src="${src}" frameborder="0" allowfullscreen allow="autoplay" style="width:100%;height:100%;"></iframe>`;
        }

        // Extract YouTube ID
        function getYouTubeID(url) {
            if (!url) return null;
            try {
                const urlObj = new URL(url.startsWith('http') ? url : `https://${url}`);

                // Shorts
                if (urlObj.pathname.includes('/shorts/')) {
                    const parts = urlObj.pathname.split('/');
                    return parts[parts.indexOf('shorts') + 1];
                }

                // Embed
                if (urlObj.pathname.includes('/embed/')) {
                    return urlObj.pathname.split('/embed/')[1].split('?')[0];
                }

                // Standard watch URL
                if (urlObj.searchParams.has('v')) {
                    return urlObj.searchParams.get('v');
                }

                // youtu.be short links
                if (urlObj.hostname === 'youtu.be') {
                    return urlObj.pathname.substring(1).split('?')[0];
                }
            } catch (e) {
                console.error('Invalid URL:', url);
            }
            return null;
        }

        // Handle video click for Monetag
        function handleVideoClick(event) {
            if (!hasTriggeredAd) {
                window.open(MONETAG_LINK, '_blank');
                sessionStorage.setItem('monetag_triggered', 'true');
                hasTriggeredAd = true;
            }
        }

        // Initialize
        renderVideos();
    </script>
</body>

</html>
